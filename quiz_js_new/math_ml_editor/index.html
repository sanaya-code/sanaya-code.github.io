<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Builder</title>
  <link rel="stylesheet" href="index.css" />

  <!-- component styles -->
  <link rel="stylesheet" href="components/atoms_panel/style.css" />
  <link rel="stylesheet" href="components/add_item_popup/style.css" />
  <link rel="stylesheet" href="components/operator_accordion/style.css" />
</head>
<body>

  <div id="app">
    <div id="left-panel">
      <div id="atoms-panel-mount"></div>
      <div id="working-set-panel-mount">
        <div class="placeholder">WorkingSetPanel</div>
      </div>
    </div>

    <div id="right-panel-mount">
      <div id="operator-accordion-mount"></div>
    </div>
  </div>

  <!-- popup mounts at app root so it overlays everything -->
  <div id="add-item-popup-mount"></div>

  <!-- state -->
  <script src="state/state.js"></script>
  <script src="state/state_controller.js"></script>

  <!-- components -->
  <script src="components/atoms_panel/component.js"></script>
  <script src="components/atoms_panel/controller.js"></script>
  <script src="components/add_item_popup/component.js"></script>
  <script src="components/add_item_popup/controller.js"></script>
  <script src="components/operator_accordion/component.js"></script>
  <script src="components/operator_accordion/controller.js"></script>

  <!-- ui composer -->
  <script src="components/ui_composer/ui_composer.js"></script>

  <!-- event handlers -->
  <script src="event_handlers/atoms_panel/event_handler.js"></script>
  <script src="event_handlers/add_item_popup/event_handler.js"></script>
  <script src="event_handlers/operator_accordion/event_handler.js"></script>

  <!-- event composer -->
  <script src="event_handlers/event_composer/event_composer.js"></script>

  <!-- app entry point -->
  <script src="main_controller.js"></script>

</body>
</html>
