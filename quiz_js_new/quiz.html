<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/mcq_question/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/true_false_question/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/multi_select/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/matching_select/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/matching_connection/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/ordering_horizontal/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/compare_quantities/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/fill_in_blank_operation/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/matching_connection_image/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/ordering/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/table_image_fill_in_blank/style.css">
    <link rel="stylesheet" href="quiz/components/question_types/table_fill_in_blank/style.css">

</head>
<body>
    <div class="quiz-container" id="quiz-container">
        <div class="quiz-content">

            <div class="quiz-header-top">
                <a href="index.html" class="nav-link">Home</a>
                <h1 id="quiz-title">Quiz</h1>
                <a href="#" id="restart-quiz" class="nav-link"
                   onclick="event.preventDefault(); document.dispatchEvent(new CustomEvent('restart-quiz'))">
                   Restart
                </a>
            </div>

            <question-wrapper id="question-wrapper"></question-wrapper>
            <navigation-panel id="navigation-panel"></navigation-panel>

        </div>

        <question-index-panel id="index-panel"></question-index-panel>
    </div>

    <!-- Config & services -->
    <script src="quiz/config.js"></script>
    <script src="quiz/storage/session_storage_service.js"></script>

    <!-- State & service -->
    <script src="quiz/quiz_state.js"></script>
    <script src="quiz/quiz_service.js"></script>

    <!-- Utils -->
    <script src="quiz/utils/quiz_result_evaluator.js"></script>
    <script src="quiz/utils/image_url_resolver.js"></script>

    <!-- Question types: evaluators first, then registry, then components -->
    <script src="quiz/components/question_types/mcq_question/evaluator.js"></script>
    <script src="quiz/components/question_types/true_false_question/evaluator.js"></script>
    <script src="quiz/components/question_types/multi_select/evaluator.js"></script>
    <script src="quiz/components/question_types/matching_select/evaluator.js"></script>
    <script src="quiz/components/question_types/matching_connection/evaluator.js"></script>
    <script src="quiz/components/question_types/ordering_horizontal/evaluator.js"></script>
    <script src="quiz/components/question_types/fill_in_blank_operation/evaluator.js"></script>
    <script src="quiz/components/question_types/compare_quantities/evaluator.js"></script>
    <script src="quiz/components/question_types/matching_connection_image/evaluator.js"></script>
    <script src="quiz/components/question_types/ordering/evaluator.js"></script>
    <script src="quiz/components/question_types/table_image_fill_in_blank/evaluator.js"></script>
    <script src="quiz/components/question_types/table_fill_in_blank/evaluator.js"></script>
    <script src="quiz/components/question_types/options_fill_in_blank/evaluator.js"></script>
    <script src="quiz/components/question_types/question_registry.js"></script>
    <script src="quiz/components/question_types/mcq_question/component.js"></script>
    <script src="quiz/components/question_types/true_false_question/component.js"></script>
    <script src="quiz/components/question_types/multi_select/component.js"></script>
    <script src="quiz/components/question_types/matching_select/component.js"></script>
    <script src="quiz/components/question_types/matching_connection/component.js"></script>
    <script src="quiz/components/question_types/ordering_horizontal/component.js"></script>
    <script src="quiz/components/question_types/fill_in_blank_operation/component.js"></script>
    <script src="quiz/components/question_types/compare_quantities/component.js"></script>
    <script src="quiz/components/question_types/matching_connection_image/component.js"></script>
    <script src="quiz/components/question_types/ordering/component.js"></script>
    <script src="quiz/components/question_types/table_image_fill_in_blank/component.js"></script>
    <script src="quiz/components/question_types/table_fill_in_blank/component.js"></script>
    <script src="quiz/components/question_types/options_fill_in_blank/component.js"></script>

    <script src="quiz/components/question_wrapper/question_wrapper.js"></script>
    <script src="quiz/components/question_wrapper/question_wrapper_controller.js"></script>
    <script src="quiz/components/navigation_panel/component.js"></script>
    <script src="quiz/components/navigation_panel/controller.js"></script>
    <script src="quiz/components/index_panel/component.js"></script>
    <script src="quiz/components/index_panel/controller.js"></script>
    <script src="quiz/components/result_modal/component.js"></script>
    <script src="quiz/components/result_modal/controller.js"></script>

    <!-- UI bundle -->
    <script src="quiz/components/ui_bundle.js"></script>
    <script src="quiz/components/ui_bundle_factory.js"></script>

    <!-- Event handlers -->
    <script src="quiz/event_handlers/navigation_handler.js"></script>
    <script src="quiz/event_handlers/index_panel_handler.js"></script>
    <script src="quiz/event_handlers/result_modal_handler.js"></script>
    <script src="quiz/event_handlers/wrapper_handler.js"></script>

    <!-- Page wiring -->
    <script src="quiz/controller.js"></script>

</html>
