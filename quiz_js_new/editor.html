<!-- editor.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Editor</title>

  <!-- Editor styles -->
  <link rel="stylesheet" href="editor/style.css" />
  <link rel="stylesheet" href="editor/components/type_selector/style.css" />
  <link rel="stylesheet" href="editor/components/question_list/style.css" />
  <link rel="stylesheet" href="editor/components/question_forms/mcq_form/style.css" />
  <link rel="stylesheet" href="editor/components/preview_panel/style.css" />

  <!-- Existing quiz component styles (for live preview) -->
  <link rel="stylesheet" href="quiz/components/question_types/mcq_question/style.css" />
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────── -->
  <header id="topbar">
    <div class="app-title">quiz<span>.</span>editor</div>
    <div class="topbar-sep"></div>
    <button class="btn btn-primary" id="btn-add-question">+ Add Question</button>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="btn-load-json">Load JSON</button>
      <button class="btn btn-ghost" id="btn-export-json">Export JSON</button>
    </div>
  </header>

  <!-- ── Empty State ─────────────────────────────────── -->
  <div id="empty-state">
    <div class="empty-title">quiz<span>.</span>editor</div>
    <div class="empty-subtitle">Create and edit quiz question banks</div>
    <div class="empty-actions">
      <button class="btn btn-empty-primary" id="btn-es-load">
        Load JSON File
      </button>
      <button class="btn btn-empty-secondary" id="btn-es-fresh">
        Start Fresh
      </button>
      <button class="btn btn-empty-draft hidden" id="btn-es-resume">
        Resume Draft
      </button>
    </div>
  </div>

  <!-- ── 3-Panel Shell ───────────────────────────────── -->
  <div id="shell" class="hidden">

    <!-- Left panel — question list -->
    <div id="panel-left">
      <div class="panel-header">Questions</div>
      <question-list id="question-list"></question-list>
    </div>

    <!-- Middle panel — editor form / type selector -->
    <div id="panel-middle">
      <editor-panel id="editor-panel"></editor-panel>
    </div>

    <!-- Right panel — preview -->
    <div id="panel-right">
      <div class="panel-header">Preview</div>
      <preview-panel id="preview-panel"></preview-panel>
    </div>

  </div>

  <!-- ── Scripts: config + state ─────────────────────── -->
  <script src="editor/config.js"></script>
  <script src="editor/state.js"></script>

  <!-- ── Scripts: custom elements ────────────────────── -->
  <script src="editor/components/type_selector/component.js"></script>
  <script src="editor/components/question_list/component.js"></script>
  <script src="editor/components/editor_panel/component.js"></script>
  <script src="editor/components/preview_panel/component.js"></script>
  <script src="editor/components/question_forms/mcq_form/component.js"></script>

  <!-- Existing quiz mcq component (for live preview) -->
  <script src="quiz/components/question_types/mcq_question/component.js"></script>

  <!-- ── Scripts: handlers + controller ──────────────── -->
  <script src="editor/event_handler/question_list/handler.js"></script>
  <script src="editor/event_handler/editor_panel/handler.js"></script>
  <script src="editor/controller.js"></script>

</body>
</html>
