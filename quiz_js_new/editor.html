<body>

  <!-- ── Topbar ──────────────────────────────────────── -->
  <header id="topbar">
    <div class="app-title">quiz<span>.</span>editor</div>
    <a class="app-link" href="math_ml_editor/index.html" target="_blank">math-expression</a>
    <div class="topbar-sep"></div>
    <button class="btn btn-primary" id="btn-add-question">+ Add Question</button>
    <button class="btn btn-primary" id="btn-import-json">Import Questions</button>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="btn-new">New Json</button>
      <button class="btn btn-ghost" id="btn-load-json">Load JSON</button>
      <button class="btn btn-ghost" id="btn-export-json">Export JSON</button>
    </div>
  </header>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept=".json" style="display:none" />

  <!-- ── Import Panel (overlay) ──────────────────────── -->
  <div id="import-panel" class="hidden"></div>

  <!-- ── Empty State ─────────────────────────────────── -->
  <div id="empty-state">
    <div class="empty-title">quiz<span>.</span>editor</div>
    <div class="empty-subtitle">Create and edit quiz question banks</div>
    <div class="empty-actions">
      <button class="btn btn-empty-primary"      id="btn-es-load">Load JSON File</button>
      <button class="btn btn-empty-secondary"    id="btn-es-fresh">Start Fresh</button>
      <button class="btn btn-empty-draft hidden" id="btn-es-resume">Resume Draft</button>
    </div>
    <div id="es-load-error" class="es-load-error hidden"></div>
  </div>

  <!-- ── 2-Panel Shell ───────────────────────────────── -->
  <div id="shell" class="hidden">

    <div id="panel-left">
      <div class="panel-header">
        <span class="panel-header-label">Questions</span>
        <div class="ql-view-toggle">
          <button class="ql-view-btn ql-view-btn-active" id="btn-view-card" title="Card view">▤</button>
          <button class="ql-view-btn" id="btn-view-dot" title="Dot view">⬡</button>
        </div>
      </div>
      <question-list id="question-list"></question-list>
    </div>

    <div id="panel-middle">
      <editor-panel id="editor-panel"></editor-panel>
    </div>

  </div>

  <!-- ── Scripts: config + state + utils ─────────────── -->
  <script src="editor/config.js"></script>
  <script src="editor/editor_form_registry.js"></script>
  <!-- State layer -->
