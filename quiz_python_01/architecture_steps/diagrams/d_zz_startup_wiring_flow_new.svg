<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">

  <rect width="1000" height="1000" fill="#f5f5f5"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===================== -->
  <!-- Diagram 1             -->
  <!-- UIComposer → Main     -->
  <!-- ===================== -->

  <!-- UIComposer -->
  <rect x="60" y="80" width="180" height="60" rx="10" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="150" y="116" text-anchor="middle" fill="#0d47a1" font-size="17">UIComposer</text>

  <!-- MainController -->
  <rect x="760" y="80" width="180" height="60" rx="10" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="850" y="116" text-anchor="middle" fill="#1b5e20" font-size="17">MainController</text>

  <!-- Arrow -->
  <line x1="240" y1="110" x2="760" y2="110" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="84" text-anchor="middle" font-size="17" fill="#333">UIBundle</text>

  <!-- Note -->
  <text x="500" y="180" text-anchor="middle" font-size="16" fill="#555">UIBundle = all application controllers</text>

  <!-- ===================== -->
  <!-- Diagram 2             -->
  <!-- ServiceComposer → Main-->
  <!-- ===================== -->

  <!-- ServiceComposer -->
  <rect x="60" y="250" width="180" height="60" rx="10" fill="#fff3e0" stroke="#ffcc80"/>
  <text x="150" y="286" text-anchor="middle" fill="#e65100" font-size="17">ServiceComposer</text>

  <!-- MainController -->
  <rect x="760" y="250" width="180" height="60" rx="10" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="850" y="286" text-anchor="middle" fill="#1b5e20" font-size="17">MainController</text>

  <!-- Arrow -->
  <line x1="240" y1="280" x2="760" y2="280" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="254" text-anchor="middle" font-size="17" fill="#333">ServiceBundle</text>

  <!-- Note -->
  <text x="500" y="350" text-anchor="middle" font-size="16" fill="#555">ServiceBundle = all service controllers</text>



  <!-- ===================== -->
  <!-- Diagram 3             -->
  <!-- LLM call (pdf_paths)  -->
  <!-- ===================== -->
  
  
  <!-- MainController -->
  <rect x="60" y="440" width="180" height="60" rx="10" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="150" y="476" text-anchor="middle" fill="#0d47a1" font-size="17">MainController</text>
  <!-- LLMController -->
  <rect x="410" y="440" width="180" height="60" rx="10" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="500" y="476" text-anchor="middle" fill="#1b5e20" font-size="17">LLMController</text>
  <!-- LLMService -->
  <rect x="760" y="440" width="180" height="60" rx="10" fill="#f3e5f5" stroke="#ce93d8"/>
  <text x="850" y="476" text-anchor="middle" fill="#6a1b9a" font-size="17">LLMService</text>
  <!-- Left arrows -->
  <line x1="240" y1="455" x2="410" y2="455" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="430" text-anchor="middle" font-size="16" fill="#333">1. LLMTransaction</text>
  <line x1="410" y1="485" x2="240" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="515" text-anchor="middle" font-size="16" fill="#333">4. LLMTransaction</text>
  <!-- Right arrows -->
  <line x1="590" y1="455" x2="760" y2="455" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="430" text-anchor="middle" font-size="16" fill="#333">2. raw request fields</text>
  <line x1="760" y1="485" x2="590" y2="485" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="515" text-anchor="middle" font-size="16" fill="#333">3. raw response</text>
  <!-- Notes -->
  <text x="500" y="550" text-anchor="middle" font-size="16" fill="#555">LLMTransaction = pdf_paths + chat history + user message + tools list</text>
  <text x="275" y="575" font-size="16" fill="#555">raw response = final answer  OR  tool call request</text>
  
  
  <!-- ===================== -->
  <!-- Diagram 4             -->
  <!-- LLM call (pdf_text)   -->
  <!-- ===================== -->
  
  
  <!-- MainController -->
  <rect x="60" y="690" width="180" height="60" rx="10" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="150" y="726" text-anchor="middle" fill="#0d47a1" font-size="17">MainController</text>
  <!-- LLMController -->
  <rect x="410" y="690" width="180" height="60" rx="10" fill="#e8f5e9" stroke="#a5d6a7"/>
  <text x="500" y="726" text-anchor="middle" fill="#1b5e20" font-size="17">LLMController</text>
  <!-- LLMService -->
  <rect x="760" y="690" width="180" height="60" rx="10" fill="#f3e5f5" stroke="#ce93d8"/>
  <text x="850" y="726" text-anchor="middle" fill="#6a1b9a" font-size="17">LLMService</text>
  <!-- Left arrows -->
  <line x1="240" y1="705" x2="410" y2="705" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="680" text-anchor="middle" font-size="16" fill="#333">1. LLMTransaction</text>
  <line x1="410" y1="735" x2="240" y2="735" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="765" text-anchor="middle" font-size="16" fill="#333">4. LLMTransaction</text>
  <!-- Right arrows -->
  <line x1="590" y1="705" x2="760" y2="705" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="680" text-anchor="middle" font-size="16" fill="#333">2. raw request fields</text>
  <line x1="760" y1="735" x2="590" y2="735" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="675" y="765" text-anchor="middle" font-size="16" fill="#333">3. raw response</text>
  <!-- Notes -->
  <text x="500" y="800" text-anchor="middle" font-size="16" fill="#555">LLMTransaction = pdf_text + chat history + user message + tools list</text>
  <text x="275" y="825" font-size="16" fill="#555">raw response = final answer  OR  tool call request</text>


</svg>
